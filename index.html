function editCislo(sl){var cur=cisloOf(sl);var v=prompt('Číslo stavby:',cur);if(v===null)return;v=v.trim();DATA.stavby_extra[sl]=DATA.stavby_extra[sl]||{};DATA.stavby_extra[sl].cislo=v;if(db)db.ref('/stavby_extra/'+sl+'/cislo').set(v);else render();}

// ── ZÁPISY Z PORAD (porada → sekce = stavby → body s ✓/⚑) ──
function setView(v){VIEW=v;$('v-stavby').classList.toggle('on',v==='stavby');$('v-zapisy').classList.toggle('on',v==='zapisy');$('view-stavby').classList.toggle('hidden',v!=='stavby');$('view-zapisy').classList.toggle('hidden',v!=='zapisy');if(v==='zapisy')renderPorady();else render();}
var PUID=0;function puid(pfx){return pfx+Date.now().toString(36)+(PUID++).toString(36);}
function dnesStr(){var d=new Date();function p(n){return (n<10?'0':'')+n;}return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear();}
function cmpTxt(a,b){return String(a||'￿').localeCompare(String(b||'￿'),'cs',{numeric:true,sensitivity:'base'});}
function deburr(s){return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();}
function porStavby(){return (DATA.stavby||[]).map(function(s){var sl=slug(s.nazev),ex=exOf(sl);return {sid:sl,nazev:displayName(s),cislo:ex.cislo||'',pripravar:ex.pripravar||'',stavbyvedouci:ex.stavbyvedouci||'',archiv:!!ex.archiv};});}
function porStavbaById(sid){var r=null;porStavby().forEach(function(o){if(o.sid===sid)r=o;});return r;}
function matchStavbaName(text){var t=deburr(text);if(!t)return null;var found=null;porStavby().forEach(function(o){if(found)return;if(deburr(o.nazev)===t)found=o.sid;});return found;}
function secStavbaId(sek){if(sek.stavbaId&&porStavbaById(sek.stavbaId))return sek.stavbaId;return matchStavbaName(sek.akce);}
function secHint(sek){var id=secStavbaId(sek);if(!id)return '';var s=porStavbaById(id)||{},parts=[];if(s.cislo)parts.push('č. '+s.cislo);if(s.stavbyvedouci)parts.push('SV '+s.stavbyvedouci);if(s.pripravar)parts.push('PŘ '+s.pripravar);return parts.join(' · ');}
function secSortKey(sek,mode){var id=secStavbaId(sek),s=id?porStavbaById(id):null;if(mode==='nazev')return s?s.nazev:sek.akce;if(mode==='cislo')return s?s.cislo:sek.akce;if(mode==='stavbyvedouci')return s?s.stavbyvedouci:'';if(mode==='pripravar')return s?s.pripravar:'';return '';}
var POR_SORTS=[['poradi','ruční pořadí'],['cislo','číslo stavby'],['nazev','název stavby'],['stavbyvedouci','stavbyvedoucí'],['pripravar','přípravář']];
function poradyOrdered(){return Object.keys(DATA.porady||{}).map(function(pid){return {pid:pid,p:DATA.porady[pid]||{}};}).sort(function(a,b){return (b.p.ts||0)-(a.p.ts||0);});}
function sekceOrdered(p){if(p.sekce)return Object.keys(p.sekce).map(function(skid){return {skid:skid,s:p.sekce[skid]||{}};}).sort(function(a,b){return (a.s.poradi||0)-(b.s.poradi||0)||(a.skid<b.skid?-1:1);});return [];}
function sekceSorted(p){var arr=sekceOrdered(p);if(SEKCE_SORT==='poradi')return arr;return arr.slice().sort(function(a,b){return cmpTxt(secSortKey(a.s,SEKCE_SORT),secSortKey(b.s,SEKCE_SORT));});}
function bodyOrdered(s){var b=s.body||{};return Object.keys(b).sort().map(function(bid){return {bid:bid,b:b[bid]||{}};});}
function porOpenCount(p){var n=0;sekceOrdered(p).forEach(function(o){bodyOrdered(o.s).forEach(function(x){if(!x.b.done)n++;});});return n;}
function porPrioCount(p){var n=0;sekceOrdered(p).forEach(function(o){bodyOrdered(o.s).forEach(function(x){if(x.b.prio&&!x.b.done)n++;});});return n;}
function porStOpts(){return porStavby().filter(function(o){return !o.archiv;}).sort(function(a,b){return cmpTxt(a.nazev,b.nazev);}).map(function(o){return '<option value="'+esc(o.sid)+'">'+esc(o.nazev)+(o.cislo?' (č. '+esc(o.cislo)+')':'')+'</option>';}).join('');}
function renderPorady(){
  var el=$('porady');if(!el)return;
  var list=poradyOrdered();
  var openTotal=0,prioTotal=0;list.forEach(function(o){openTotal+=porOpenCount(o.p);prioTotal+=porPrioCount(o.p);});
  var h='<div class="por-top"><div class="por-h">📋 Zápisy z porad'
    +'<span class="por-sub">'+list.length+' porad · '+openTotal+' otevřených'+(prioTotal?' · <b class="por-priocnt">⚑ '+prioTotal+' priorit</b>':'')+'</span></div>'
    +'<div class="por-tools"><select id="por-sort" class="por-sortsel" title="Řazení staveb v zápisu">'
    +POR_SORTS.map(function(o){return '<option value="'+o[0]+'"'+(SEKCE_SORT===o[0]?' selected':'')+'>řadit: '+o[1]+'</option>';}).join('')+'</select>'
    +'<button class="btn'+(PRIO_ONLY?' on':'')+'" id="por-prio">⚑ jen priority</button>'
    +'<button class="btn" id="por-skryt">'+(SKRYT_VYRESENE?'☑ vyřešené skryté':'☐ skrýt vyřešené')+'</button>'
    +'<button class="btn" id="por-print">🖨️ Tisk</button>'
    +'<button class="btn btn-add" id="por-new">+ Nová porada</button></div></div>';
  if(!list.length){h+='<div class="por-empty">Zatím žádný zápis. <b>„+ Nová porada"</b> → přidej stavbu (nebo „všechny aktivní") a piš pod ni poznámky. Sekce = stavby, jdou <b>řadit podle stavbyvedoucího / přípraváře / čísla</b>. Vyřešené odškrtni „✓", důležité označ vlaječkou <b>⚑</b>. <b>„↧ Přenést nevyřešené"</b> stáhne z minula vše otevřené, nebo přenes jednotlivě tlačítkem <b>↥</b> u poznámky.</div>';el.innerHTML=h;return;}
  var stOpts=porStOpts();
  list.forEach(function(o,i){
    var p=o.p,isNew=(i===0),prev=list[i+1];
    h+='<div class="porada'+(isNew?' pnew':' pold')+'" data-por="'+o.pid+'">'
      +'<div class="por-head"><span class="por-dot"></span>'
      +'<input class="por-datum" data-pdat="'+o.pid+'" value="'+esc(p.datum||'')+'" title="datum porady">'
      +(isNew?'<span class="por-tag">nejnovější</span>':'')
      +'<span class="por-spc"></span>'
      +(prev?'<button class="por-carry" data-pcarry="'+o.pid+'" title="zkopíruje sem všechny neodškrtnuté body z porady '+esc(prev.p.datum||'')+'">↧ Přenést vše nevyřešené z '+esc(prev.p.datum||'minulé')+'</button>':'')
      +'<button class="por-x" data-pdel="'+o.pid+'" title="smazat celou poradu">✕ porada</button></div>';
    var seks=sekceSorted(p),shownSek=0;
    seks.forEach(function(so){
      var bods=bodyOrdered(so.s),vis=bods.filter(function(x){return !(x.b.done&&SKRYT_VYRESENE)&&(!PRIO_ONLY||x.b.prio);});
      if((SKRYT_VYRESENE||PRIO_ONLY)&&!vis.length)return;
      shownSek++;var hint=secHint(so.s);
      h+='<div class="psek" data-skid="'+so.skid+'"><div class="psek-head"><input class="psek-akce" data-pakce="'+o.pid+'|'+so.skid+'" value="'+esc(so.s.akce||'')+'" placeholder="Stavba / akce">'
        +(hint?'<span class="psek-hint">'+esc(hint)+'</span>':'')
        +'<button class="psek-x" data-pskdel="'+o.pid+'|'+so.skid+'" title="smazat sekci">✕</button></div>';
      vis.forEach(function(x){
        h+='<div class="pbod'+(x.b.done?' done':'')+(x.b.prio?' prio':'')+'">'
          +'<button class="pchk" data-ptog="'+o.pid+'|'+so.skid+'|'+x.bid+'" title="'+(x.b.done?'vrátit jako otevřené':'označit vyřešeno')+'">'+(x.b.done?'✓':'')+'</button>'
          +'<div class="ptxt" contenteditable="true" data-ptxt="'+o.pid+'|'+so.skid+'|'+x.bid+'" placeholder="napiš poznámku…">'+esc(x.b.text||'')+'</div>'
          +'<button class="pflag'+(x.b.prio?' on':'')+'" data-pprio="'+o.pid+'|'+so.skid+'|'+x.bid+'" title="prioritní úkol">⚑</button>'
          +(!isNew&&!x.b.done?'<button class="pup" data-pup="'+o.pid+'|'+so.skid+'|'+x.bid+'" title="přenést tuto poznámku do nejnovější porady">↥</button>':'')
          +'<button class="pbx" data-pbdel="'+o.pid+'|'+so.skid+'|'+x.bid+'" title="smazat poznámku">✕</button></div>';
      });
      if(!vis.length)h+='<div class="por-none">— '+(PRIO_ONLY?'žádné priority':'vše vyřešené')+' —</div>';
      h+='<button class="pbod-add" data-padd="'+o.pid+'|'+so.skid+'">+ poznámka</button></div>';
    });
    if(!shownSek)h+='<div class="por-none" style="padding-left:2px">— '+(PRIO_ONLY?'žádné prioritní poznámky':'žádné poznámky')+' —</div>';
    h+='<div class="psek-tools"><select class="psek-pick" data-ppick="'+o.pid+'"><option value="">+ přidat stavbu…</option>'+stOpts+'</select>'
      +'<button class="psek-add" data-pseka="'+o.pid+'">+ volná sekce</button>'
      +'<button class="psek-add" data-pall="'+o.pid+'">+ všechny aktivní stavby</button></div></div>';
  });
  el.innerHTML=h;
}
function porFind(pid){return DATA.porady[pid];}
function porMaxPoradi(p){var m=0;sekceOrdered(p).forEach(function(o){if((o.s.poradi||0)>m)m=o.s.poradi||0;});return m;}
function porNewSekceObj(akce,poradi,stavbaId){var o={akce:akce||'',poradi:poradi,body:{}};if(stavbaId)o.stavbaId=stavbaId;return o;}
function porWriteSekce(pid,skid,sek){if(db)db.ref('/porady/'+pid+'/sekce/'+skid).set(sek);}
function porNew(){var pid=puid('p');DATA.porady=DATA.porady||{};DATA.porady[pid]={datum:dnesStr(),ts:Date.now(),sekce:{}};if(db)db.ref('/porady/'+pid).set(DATA.porady[pid]);renderPorady();var sel=document.querySelector('[data-ppick="'+pid+'"]');if(sel)sel.focus();}
function porAddSekce(pid){var p=porFind(pid);if(!p)return;p.sekce=p.sekce||{};var skid=puid('s');p.sekce[skid]=porNewSekceObj('',porMaxPoradi(p)+1);var bid=puid('b');p.sekce[skid].body[bid]={text:'',done:false};porWriteSekce(pid,skid,p.sekce[skid]);renderPorady();var t=document.querySelector('[data-pakce="'+pid+'|'+skid+'"]');if(t)t.focus();}
function porAddStavba(pid,sid){var p=porFind(pid),s=porStavbaById(sid);if(!p||!s)return;p.sekce=p.sekce||{};var skid=puid('s');p.sekce[skid]=porNewSekceObj(s.nazev||sid,porMaxPoradi(p)+1,sid);var bid=puid('b');p.sekce[skid].body[bid]={text:'',done:false};porWriteSekce(pid,skid,p.sekce[skid]);renderPorady();var t=document.querySelector('[data-ptxt="'+pid+'|'+skid+'|'+bid+'"]');if(t)t.focus();}
function porAddAllStavby(pid){var p=porFind(pid);if(!p)return;p.sekce=p.sekce||{};var have={};sekceOrdered(p).forEach(function(o){var id=secStavbaId(o.s);if(id)have[id]=1;});var add=porStavby().filter(function(o){return !o.archiv&&!have[o.sid];}).sort(function(a,b){return cmpTxt(a.nazev,b.nazev);});if(!add.length){alert('Všechny aktivní stavby už v poradě jsou.');return;}var por=porMaxPoradi(p);add.forEach(function(o){var skid=puid('s');p.sekce[skid]=porNewSekceObj(o.nazev||o.sid,++por,o.sid);porWriteSekce(pid,skid,p.sekce[skid]);});renderPorady();}
function porAddBod(pid,skid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid])return;p.sekce[skid].body=p.sekce[skid].body||{};var bid=puid('b');p.sekce[skid].body[bid]={text:'',done:false};if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid).set(p.sekce[skid].body[bid]);renderPorady();var t=document.querySelector('[data-ptxt="'+pid+'|'+skid+'|'+bid+'"]');if(t)t.focus();}
function porToggle(pid,skid,bid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid]||!p.sekce[skid].body[bid])return;var b=p.sekce[skid].body[bid];b.done=!b.done;if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid+'/done').set(b.done?true:null);renderPorady();}
function porTogglePrio(pid,skid,bid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid]||!p.sekce[skid].body[bid])return;var b=p.sekce[skid].body[bid];b.prio=!b.prio;if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid+'/prio').set(b.prio?true:null);renderPorady();}
function porDelBod(pid,skid,bid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid])return;delete p.sekce[skid].body[bid];if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid).remove();renderPorady();}
function porDelSekce(pid,skid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid])return;var has=Object.keys(p.sekce[skid].body||{}).length;if(has&&!confirm('Smazat sekci „'+(p.sekce[skid].akce||'(bez názvu)')+'" i s poznámkami?'))return;delete p.sekce[skid];if(db)db.ref('/porady/'+pid+'/sekce/'+skid).remove();renderPorady();}
function porDel(pid){if(!confirm('Smazat celou poradu i se všemi stavbami a poznámkami?'))return;delete DATA.porady[pid];if(db)db.ref('/porady/'+pid).remove();renderPorady();}
function porSaveText(pid,skid,bid,txt){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid]||!p.sekce[skid].body[bid])return;if(p.sekce[skid].body[bid].text===txt)return;p.sekce[skid].body[bid].text=txt;if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid+'/text').set(txt);}
function porSaveAkce(pid,skid,txt){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid]||p.sekce[skid].akce===txt)return;p.sekce[skid].akce=txt;if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/akce').set(txt);renderPorady();}
function porSaveDatum(pid,txt){var p=porFind(pid);if(!p||p.datum===txt)return;p.datum=txt;if(db)db.ref('/porady/'+pid+'/datum').set(txt);}
function porFindOrCreateSekce(pid,akce,stavbaId){var p=porFind(pid);p.sekce=p.sekce||{};var found=null;sekceOrdered(p).forEach(function(o){if(found)return;var oid=secStavbaId(o.s);if(stavbaId&&oid===stavbaId)found=o.skid;else if(!stavbaId&&akce&&deburr(o.s.akce)===deburr(akce))found=o.skid;});if(found)return found;var skid=puid('s');p.sekce[skid]=porNewSekceObj(akce||'',porMaxPoradi(p)+1,stavbaId);porWriteSekce(pid,skid,p.sekce[skid]);return skid;}
function porCarry(pid){var p=porFind(pid);if(!p)return;var list=poradyOrdered(),idx=-1;list.forEach(function(o,i){if(o.pid===pid)idx=i;});var prev=list[idx+1];if(!prev){alert('Žádná starší porada k přenosu.');return;}var moved=0;p.sekce=p.sekce||{};sekceOrdered(prev.p).forEach(function(so){var open=bodyOrdered(so.s).filter(function(x){return !x.b.done;});if(!open.length)return;var skid=porFindOrCreateSekce(pid,so.s.akce||'',secStavbaId(so.s)?(so.s.stavbaId||secStavbaId(so.s)):null);open.forEach(function(x){var bid=puid('b');var nb={text:x.b.text||'',done:false};if(x.b.prio)nb.prio=true;p.sekce[skid].body[bid]=nb;moved++;if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid).set(nb);});});renderPorady();if(!moved)alert('Z porady '+(prev.p.datum||'')+' nezbyly žádné nevyřešené poznámky.');}
function porCarryOne(pid,skid,bid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid]||!p.sekce[skid].body[bid])return;var newest=poradyOrdered()[0];if(!newest||newest.pid===pid){alert('Tohle už je nejnovější porada.');return;}var so=p.sekce[skid],x=so.body[bid];var tskid=porFindOrCreateSekce(newest.pid,so.akce||'',secStavbaId(so)?(so.stavbaId||secStavbaId(so)):null);var nbid=puid('b'),nb={text:x.text||'',done:false};if(x.prio)nb.prio=true;DATA.porady[newest.pid].sekce[tskid].body[nbid]=nb;if(db)db.ref('/porady/'+newest.pid+'/sekce/'+tskid+'/body/'+nbid).set(nb);renderPorady();}
function porPrint(){var list=poradyOrdered(),w=window.open('','_blank');if(!w)return;var html='<html><head><meta charset="utf-8"><title>Zápis z porad</title><style>body{font-family:Arial,sans-serif;color:#111;max-width:820px;margin:24px auto;padding:0 16px}h1{font-size:18px}h2{font-size:15px;border-bottom:1px solid #999;padding-bottom:3px;margin-top:22px}h3{font-size:13px;margin:12px 0 2px}ul{margin:3px 0 10px}li{margin:2px 0;line-height:1.4}.d{text-decoration:line-through;color:#777}.pr{font-weight:700}</style></head><body>';html+='<h1>Zápisy z porad — M - SILNICE a.s. · OZ Jih</h1>';list.forEach(function(o){var p=o.p;html+='<h2>Porada '+esc(p.datum||'')+'</h2>';sekceSorted(p).forEach(function(so){var bods=bodyOrdered(so.s);if(!bods.length&&!so.s.akce)return;if(so.s.akce)html+='<h3>'+esc(so.s.akce)+'</h3>';html+='<ul>';bods.forEach(function(x){html+='<li class="'+(x.b.done?'d':'')+(x.b.prio?' pr':'')+'">'+(x.b.done?'✓ ':x.b.prio?'⚑ ':'• ')+esc(x.b.text||'')+'</li>';});html+='</ul>';});});html+='</body></html>';w.document.write(html);w.document.close();w.focus();w.print();}
$('v-stavby').addEventListener('click',function(){setView('stavby');});
$('v-zapisy').addEventListener('click',function(){setView('zapisy');});
$('porady').addEventListener('click',function(e){
  if(e.target.closest('#por-print')){porPrint();return;}
  if(e.target.closest('#por-skryt')){SKRYT_VYRESENE=!SKRYT_VYRESENE;renderPorady();return;}
  if(e.target.closest('#por-prio')){PRIO_ONLY=!PRIO_ONLY;renderPorady();return;}
  if(e.target.closest('#por-new')){porNew();return;}
  var cy=e.target.closest('[data-pcarry]');if(cy){porCarry(cy.getAttribute('data-pcarry'));return;}
  var up=e.target.closest('[data-pup]');if(up){var u=up.getAttribute('data-pup').split('|');porCarryOne(u[0],u[1],u[2]);return;}
  var al=e.target.closest('[data-pall]');if(al){porAddAllStavby(al.getAttribute('data-pall'));return;}
  var sa=e.target.closest('[data-pseka]');if(sa){porAddSekce(sa.getAttribute('data-pseka'));return;}
  var ad=e.target.closest('[data-padd]');if(ad){var a=ad.getAttribute('data-padd').split('|');porAddBod(a[0],a[1]);return;}
  var pr=e.target.closest('[data-pprio]');if(pr){var pp=pr.getAttribute('data-pprio').split('|');porTogglePrio(pp[0],pp[1],pp[2]);return;}
  var tg=e.target.closest('[data-ptog]');if(tg){var t=tg.getAttribute('data-ptog').split('|');porToggle(t[0],t[1],t[2]);return;}
  var bd=e.target.closest('[data-pbdel]');if(bd){var d=bd.getAttribute('data-pbdel').split('|');porDelBod(d[0],d[1],d[2]);return;}
  var sd=e.target.closest('[data-pskdel]');if(sd){var s=sd.getAttribute('data-pskdel').split('|');porDelSekce(s[0],s[1]);return;}
  var pd=e.target.closest('[data-pdel]');if(pd){porDel(pd.getAttribute('data-pdel'));return;}
});
$('porady').addEventListener('change',function(e){
  if(e.target.id==='por-sort'){SEKCE_SORT=e.target.value;renderPorady();return;}
  var pk=e.target.closest('[data-ppick]');if(pk&&e.target.value){porAddStavba(pk.getAttribute('data-ppick'),e.target.value);return;}
});
$('porady').addEventListener('focusout',function(e){
  var tx=e.target.closest('[data-ptxt]');if(tx){var p=tx.getAttribute('data-ptxt').split('|');porSaveText(p[0],p[1],p[2],tx.textContent.trim());return;}
  var ak=e.target.closest('[data-pakce]');if(ak){var a=ak.getAttribute('data-pakce').split('|');porSaveAkce(a[0],a[1],ak.value.trim());return;}
  var dt=e.target.closest('[data-pdat]');if(dt){porSaveDatum(dt.getAttribute('data-pdat'),dt.value.trim());return;}
});

function showApp(){$('gate').classList.add('hidden');$('topbar').classList.remove('hidden');$('app').classList.remove('hidden');render();renderPorady();}
function normalize(raw){var out={meta:(raw&&raw.meta)||{},stavby:[],poznamky:(raw&&raw.poznamky)||{},upravy:(raw&&raw.upravy)||{},rucni:(raw&&raw.rucni)||{},stavby_extra:(raw&&raw.stavby_extra)||{},dulezite:(raw&&raw.dulezite)||{},porady:(raw&&raw.porady)||{}};
  var sv=(raw&&raw.stavby)||{};Object.keys(sv).forEach(function(k){var s=sv[k];s._k=k;out.stavby.push(s);});
  out.stavby.sort(function(a,b){return (a.poradi||0)-(b.poradi||0);});
  out.stavby.forEach(function(s){var pl=s.polozky||[];if(!Array.isArray(pl)){var arr=[];Object.keys(pl).forEach(function(k){arr.push(pl[k]);});s.polozky=arr;}});return out;}

$('search').addEventListener('input',function(){FILTER.q=this.value;render();});
$('sidebar').addEventListener('click',function(e){var b=e.target.closest('[data-sid]');if(b){FILTER.stavba=b.getAttribute('data-sid');$('split').classList.add('show-detail');render();}});
$('f-sort').addEventListener('change',function(){FILTER.sort=this.value;render();});
function segHandler(id,prop){$(id).addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;FILTER[prop]=b.getAttribute('data-v');[].forEach.call(this.querySelectorAll('button'),function(x){x.classList.toggle('on',x===b);});render();});}
segHandler('f-stav','stav');
$('f-typ').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;var v=b.getAttribute('data-v');FILTER.typ[v]=!FILTER.typ[v];b.classList.toggle('on',FILTER.typ[v]);render();});
$('detail').addEventListener('click',function(e){
  if(e.target.closest('#backbtn')){$('split').classList.remove('show-detail');return;}
  var se=e.target.closest('[data-stedit]'); if(se){openStavbaEdit(se.getAttribute('data-stedit'));return;}
  var ed=e.target.closest('[data-ed]'); if(ed){var pr=ed.getAttribute('data-ed').split('|');openEdit(pr[0],pr.slice(1).join('|'));return;}
  var ad=e.target.closest('[data-add]'); if(ad){openNew(ad.getAttribute('data-add'));return;}
  var dl=e.target.closest('[data-del]'); if(dl){if(confirm('Smazat tento řádek?'))delRow(dl.getAttribute('data-del'));return;}
  var ci=e.target.closest('[data-cislo]'); if(ci){editCislo(ci.getAttribute('data-cislo'));return;}
  var st=e.target.closest('[data-star]'); if(st){toggleDul(st.getAttribute('data-star'));return;}
  var arb=e.target.closest('[data-arch]'); if(arb){toggleArchiv(arb.getAttribute('data-arch'));return;}
});
function toggleArchiv(sl){setArchived(sl,!isArchived(sl));}
function toggleDul(key){DATA.dulezite=DATA.dulezite||{};if(DATA.dulezite[key]){delete DATA.dulezite[key];if(db)db.ref('/dulezite/'+key).remove();else render();}else{DATA.dulezite[key]=true;if(db)db.ref('/dulezite/'+key).set(true);else render();}}
$('f-dul').addEventListener('click',function(){FILTER.dulezite=!FILTER.dulezite;this.classList.toggle('on',FILTER.dulezite);render();});
$('f-arch').addEventListener('click',function(){FILTER.archiv=!FILTER.archiv;FILTER.stavba='';render();});
$('f-prip').addEventListener('change',function(){FILTER.pripravar=this.value;FILTER.stavba='';render();});
$('f-svd').addEventListener('change',function(){FILTER.stavbyvedouci=this.value;FILTER.stavba='';render();});
$('m-cancel').addEventListener('click',closeModal);
$('m-save').addEventListener('click',saveModal);
$('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
var SCTX=null;
function openStavbaEdit(sl){SCTX={sl:sl};var ex=exOf(sl);$('s-nazev').value=(ex.nazev&&String(ex.nazev).trim())?ex.nazev:(origNazev(sl)||'').replace(/[„“”]/g,'').trim();$('s-investor').value=ex.investor||'';$('s-cislo').value=ex.cislo||'';$('s-pripravar').value=ex.pripravar||'';$('s-stavbyvedouci').value=ex.stavbyvedouci||'';$('s-predani').value=ex.predani||'';$('s-dokonceni').value=ex.dokonceni||'';$('s-uzivani').value=ex.uzivani||'';$('smodal').classList.remove('hidden');}
function saveStavbaEdit(){if(!SCTX)return;var sl=SCTX.sl;var o={nazev:$('s-nazev').value.trim(),investor:$('s-investor').value.trim(),cislo:$('s-cislo').value.trim(),pripravar:$('s-pripravar').value.trim(),stavbyvedouci:$('s-stavbyvedouci').value.trim(),predani:$('s-predani').value,dokonceni:$('s-dokonceni').value,uzivani:$('s-uzivani').value};DATA.stavby_extra=DATA.stavby_extra||{};DATA.stavby_extra[sl]=Object.assign(DATA.stavby_extra[sl]||{},o);if(db)db.ref('/stavby_extra/'+sl).update(o);$('smodal').classList.add('hidden');SCTX=null;if(!db)render();}
$('s-cancel').addEventListener('click',function(){$('smodal').classList.add('hidden');SCTX=null;});
$('s-save').addEventListener('click',saveStavbaEdit);
$('smodal').addEventListener('click',function(e){if(e.target===this){this.classList.add('hidden');SCTX=null;}});

function startApp(){if(started)return;started=true;showApp();try{db.ref('/').on('value',function(snap){DATA=normalize(snap.val()||{});render();renderPorady();},function(){});}catch(e){}}
if(DEMO_MODE){$('demo').classList.remove('hidden');DATA=DEMO;DATA.poznamky={};DATA.upravy={};DATA.rucni={};DATA.stavby_extra={};DATA.porady={};showApp();$('logout').classList.add('hidden');}
else{
  firebase.initializeApp(FIREBASE_CONFIG);auth=firebase.auth();db=firebase.database();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function(){});
  $('g-login').addEventListener('click',function(){$('g-err').textContent='';var e=$('g-email').value.trim(),p=$('g-pass').value;
    if(!e||!p){$('g-err').textContent='Vyplň e-mail i heslo.';return;}$('g-login').textContent='Přihlašuji…';
    auth.signInWithEmailAndPassword(e,p).then(function(){startApp();}).catch(function(err){$('g-login').textContent='Přihlásit';$('g-err').textContent='Chyba: '+(err&&err.code?err.code:'')+' '+(err&&err.message?err.message:'');});});
  $('g-pass').addEventListener('keydown',function(ev){if(ev.key==='Enter')$('g-login').click();});
  $('logout').addEventListener('click',function(){started=false;auth.signOut();});
  auth.onAuthStateChanged(function(user){if(user){startApp();}else{started=false;$('gate').classList.remove('hidden');$('topbar').classList.add('hidden');$('app').classList.add('hidden');$('g-login').textContent='Přihlásit';}});
}
</script>
</body>
