<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poptávky a objednávky — M - SILNICE a.s.</title>
<style>
  :root{--bg:#0f1720;--card:#16212e;--line:#26384a;--txt:#e7eef6;--muted:#9fb2c6;
    --poptavka:#2563eb;--objednavka:#16a34a;--accent:#3b82f6;--head:#111c28;--title:#142433;
    --pos:#16a34a;--neg:#ef4444;--edit:#0c131b;--rucni:#1a2740;--editing:#1d2c1f;--smlouva:#b45309;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:5;background:#0c131b;border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700;line-height:1.2}
  header .sub{font-size:11px;color:var(--muted)}
  header .spacer{flex:1}
  .btn{background:#1f2d3d;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn-add{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .ctrl{background:var(--edit);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;font-size:14px}
  #search{flex:1;min-width:160px;max-width:320px}
  .wrap{padding:12px 14px 60px;max-width:1320px;margin:0 auto}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0 14px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--edit);color:var(--muted);border:0;padding:8px 12px;font-size:13px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;font-weight:700}
  .badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
  .b-pop{background:var(--poptavka)} .b-obj{background:var(--objednavka)} .b-sml{background:var(--smlouva)}
  .stavba{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .stavba .title{padding:12px 14px;border-bottom:1px solid var(--line);background:var(--title);display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
  .stavba .title .nazev{font-size:18px;font-weight:800;letter-spacing:.4px}
  .stavba .title .info{font-size:12px;color:var(--muted);margin-top:3px}
  .stavba .title .spc{flex:1}
  .cislo{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .cislo input{width:130px;background:var(--edit);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:12px}
  .tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:1120px}
  th,td{padding:6px 8px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:top;text-align:left}
  th:last-child,td:last-child{border-right:none}
  thead th{font-size:11px;color:var(--muted);background:var(--head);text-align:center;font-weight:700}
  thead tr.grp th{text-transform:uppercase;letter-spacing:.5px}
  td.komodita{font-weight:700;white-space:nowrap}
  td.c{text-align:center}
  td.cena{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.pozn{color:var(--muted);font-size:12px;min-width:170px}
  .uspora-pos{color:var(--pos)} .uspora-neg{color:var(--neg)}
  tr:last-child td{border-bottom:none}
  tr.mrow td{background:var(--rucni)}
  tr.editing td{background:var(--editing)}
  textarea.note{width:100%;min-width:150px;min-height:30px;background:var(--edit);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:5px 7px;font:inherit;font-size:12px;resize:vertical}
  .cell{width:100%;min-width:64px;background:var(--edit);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:5px 6px;font:inherit;font-size:12px}
  .cell:focus,textarea.note:focus{outline:none;border-color:var(--accent)}
  .cell.komo{min-width:120px;font-weight:700}
  .cell.ctr{text-align:center} .cell.num{text-align:right}
  select.cell{min-width:60px;cursor:pointer}
  .iconbtn{background:transparent;border:1px solid var(--line);border-radius:6px;color:var(--txt);cursor:pointer;font-size:12px;padding:3px 7px}
  .iconbtn.done{background:var(--objednavka);border-color:var(--objednavka);color:#fff}
  .del{background:transparent;border:0;color:var(--neg);cursor:pointer;font-size:14px;padding:0 2px}
  .note-status{font-size:10px;color:var(--muted);height:11px}
  .empty{color:var(--muted);font-size:13px;padding:14px}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20}
  #gate .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;width:100%;max-width:340px}
  #gate h2{margin:0 0 4px;font-size:18px} #gate p{margin:0 0 16px;color:var(--muted);font-size:13px}
  #gate input{width:100%;padding:11px 12px;margin-bottom:10px;border-radius:9px;border:1px solid var(--line);background:#0c131b;color:var(--txt);font-size:15px}
  #gate .btn{width:100%;background:var(--accent);border-color:var(--accent);font-weight:700;padding:11px}
  #gate .err{color:#f87171;font-size:12px;min-height:16px;margin-top:6px;word-break:break-word}
  .hidden{display:none!important}
  .demo-bar{background:#7c3a02;color:#ffd9a8;font-size:12px;text-align:center;padding:6px}
</style>
</head>
<body>

<div id="gate"><div class="box">
  <h2>Poptávky a objednávky</h2><p>M - SILNICE a.s. · OZ Jih — přihlášení</p>
  <input id="g-email" type="email" placeholder="e-mail" autocomplete="username">
  <input id="g-pass" type="password" placeholder="heslo" autocomplete="current-password">
  <button class="btn" id="g-login">Přihlásit</button><div class="err" id="g-err"></div>
</div></div>

<div id="demo" class="demo-bar hidden">UKÁZKOVÝ REŽIM — data jsou demo, změny se neukládají.</div>

<header class="hidden" id="topbar">
  <div><h1>Poptávky a objednávky</h1><div class="sub" id="updated">M - SILNICE a.s. · OZ Jih</div></div>
  <div class="spacer"></div><button class="btn" id="logout">Odhlásit</button>
</header>

<div class="wrap hidden" id="app">
  <div class="toolbar">
    <input id="search" class="ctrl" placeholder="🔎 hledat…">
    <select id="f-stavba" class="ctrl"><option value="">Všechny stavby</option></select>
    <div class="seg" id="f-typ"><button data-v="all" class="on">Vše</button><button data-v="pop">Poptávky</button><button data-v="obj">Objednávky</button><button data-v="sml">Smlouvy</button></div>
    <div class="seg" id="f-stav"><button data-v="all" class="on">Vše</button><button data-v="obj">Objednáno</button><button data-v="ceka">Čeká</button></div>
  </div>
  <div id="list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyA_9Zm7J_iDVkcfF3MAWoSMEtJipBkIAo0",
  authDomain: "poptavky-objednavky.firebaseapp.com",
  databaseURL: "https://poptavky-objednavky-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "poptavky-objednavky", storageBucket: "poptavky-objednavky.firebasestorage.app",
  messagingSenderId: "418167107219", appId: "1:418167107219:web:225bafe8e9b79636cca766"
};
var DEMO={meta:{updatedAt:"16.6.2026 (demo)"},stavby:[
  {nazev:"„II/603 SULICE – ŽELIVEC\"",info:"Začátek 11.5.2026",polozky:[
    {komodita:"Dopravní značení",typ:"POPTÁVKA",kolo1:"4.6.",poznamka:"Termín do 8.6.2026."},
    {komodita:"Krajnice",typ:"OBJEDNÁVKA",kolo1:"16.6.",vitez:"DOKR NB",zasmluvneni:"Objednávka",objednano:"ANO",poznamka:"Čeká na podpis."}]},
  {nazev:"„D4 PHS MNÍŠEK POD BRDY\"",info:"PHS",polozky:[
    {komodita:"Beton",typ:"OBJEDNÁVKA",kolo1:"26.5.",vitez:"PROTEKO",zasmluvneni:"Objednávka",objednano:"ANO"}]}
]};

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function isPlaceholder(){return !FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.indexOf('PLACEHOLDER')!==-1;}
var DEMO_MODE = isPlaceholder() || /[?&]demo/.test(location.search) || location.hostname==='localhost' || location.hostname==='127.0.0.1';

var DATA={meta:{},stavby:[],poznamky:{},upravy:{},rucni:{},stavby_extra:{}};
var FILTER={q:'',stavba:'',typ:'all',stav:'all'};
var EDITING={};            // klíče řádků v režimu úprav
var db=null, auth=null, started=false;

function fmtNum(v){if(v===''||v==null)return '';var n=(typeof v==='number')?v:parseFloat(String(v).replace(/\s/g,'').replace(',','.'));if(isNaN(n))return esc(v);return n.toLocaleString('cs-CZ',{minimumFractionDigits:0,maximumFractionDigits:2});}
function toNum(v){var n=(typeof v==='number')?v:parseFloat(String(v).replace(/\s/g,'').replace(',','.'));return isNaN(n)?null:n;}
function isObj(p){return (p.typ||'').toUpperCase().indexOf('OBJ')===0;}
function typKind(p){var t=(p.typ||'').toUpperCase(),z=(p.zasmluvneni||'').toLowerCase();
  if(t.indexOf('SMLOU')===0 || z.indexOf('smlouv')!==-1 || z.indexOf('rs')!==-1) return 'sml';
  if(t.indexOf('OBJ')===0 || z.indexOf('obj')!==-1 || (p.objednano||'').toUpperCase().indexOf('ANO')===0) return 'obj';
  return 'pop';}
function badgeHtml(p){var k=typKind(p),m={pop:['b-pop','POP'],obj:['b-obj','OBJ'],sml:['b-sml','SML']}[k];return '<span class="badge '+m[0]+'">'+m[1]+'</span>';}
function slug(s){return String(s).replace(/[„""]/g,'').replace(/[.$#\[\]\/\x00-\x1f]+/g,'_').replace(/\s+/g,'_').slice(0,180);}
function rowKey(nazev,komodita){return (slug(nazev)+'__'+slug(komodita)).slice(0,200);}
function eff(nazev,p0){var k=rowKey(nazev,p0.komodita),ov=(DATA.upravy&&DATA.upravy[k])?DATA.upravy[k]:{},o={};
  ['komodita','typ','kolo1','kolo2','kolo3','vitez','zasmluvneni','objednano','cenaNakladova','cenaVysoutezena','poznamka'].forEach(function(f){o[f]=(f in ov)?ov[f]:(p0[f]!=null?p0[f]:'');});return o;}

function buildStavbaFilter(){var sel=$('f-stavba'),cur=sel.value,opts='<option value="">Všechny stavby</option>';
  (DATA.stavby||[]).forEach(function(s,i){opts+='<option value="'+i+'">'+esc((s.nazev||'').replace(/[„""]/g,'').trim())+'</option>';});
  sel.innerHTML=opts; sel.value=cur;}
function passFilter(nazev,p){var kind=typKind(p);
  if(FILTER.typ!=='all' && FILTER.typ!==kind) return false;
  var jeObj=(String(p.objednano||'').toUpperCase().indexOf('ANO')===0);
  if(FILTER.stav==='obj'&&!jeObj)return false; if(FILTER.stav==='ceka'&&jeObj)return false;
  var q=FILTER.q.trim().toLowerCase();
  if(q && (nazev+' '+(p.komodita||'')+' '+(p.vitez||'')+' '+(p.poznamka||'')).toLowerCase().indexOf(q)===-1)return false;
  return true;}
function uspora(p){var nN=toNum(p.cenaNakladova),nV=toNum(p.cenaVysoutezena);if(nN!=null&&nV!=null){var d=nN-nV;return '<span class="'+(d>=0?'uspora-pos':'uspora-neg')+'">'+fmtNum(d)+'</span>';}return '';}
function C(mode,k,f,val,cls){return '<input class="cell '+(cls||'')+'" data-mode="'+mode+'" data-k="'+esc(k)+'" data-f="'+f+'" value="'+esc(val||'')+'">';}
function typSel(mode,k,p){var kd=typKind(p);return '<select class="cell" data-mode="'+mode+'" data-k="'+esc(k)+'" data-f="typ"><option value="POPTÁVKA"'+(kd==='pop'?' selected':'')+'>POP</option><option value="OBJEDNÁVKA"'+(kd==='obj'?' selected':'')+'>OBJ</option><option value="SMLOUVA"'+(kd==='sml'?' selected':'')+'>SML</option></select>';}
function noteCell(nazev,komodita){var key=rowKey(nazev,komodita),mp=(DATA.poznamky&&DATA.poznamky[key])?DATA.poznamky[key]:'';
  return '<td><textarea class="note" data-notekey="'+esc(key)+'" placeholder="moje poznámka…">'+esc(mp)+'</textarea><div class="note-status" data-st="'+esc(key)+'"></div></td>';}

// mirrovaný řádek: read-only + ✏️, nebo (v EDITING) editovatelný + ✓
function mRow(nazev,p,k){
  var ed=!!EDITING[k];
  var head='<button class="iconbtn'+(ed?' done':'')+'" data-edit="'+esc(k)+'" title="'+(ed?'hotovo':'upravit')+'">'+(ed?'✓':'✏️')+'</button> ';
  if(ed){
    return '<tr class="editing"><td class="komodita">'+head+typSel('m',k,p)+' '+C('m',k,'komodita',p.komodita,'komo')+'</td>'
      +'<td>'+C('m',k,'kolo1',p.kolo1,'ctr')+'</td><td>'+C('m',k,'kolo2',p.kolo2,'ctr')+'</td><td>'+C('m',k,'kolo3',p.kolo3,'ctr')+'</td>'
      +'<td>'+C('m',k,'vitez',p.vitez,'ctr')+'</td><td>'+C('m',k,'zasmluvneni',p.zasmluvneni,'ctr')+'</td><td>'+C('m',k,'objednano',p.objednano,'ctr')+'</td>'
      +'<td class="cena">'+C('m',k,'cenaNakladova',p.cenaNakladova,'num')+'</td><td class="cena">'+C('m',k,'cenaVysoutezena',p.cenaVysoutezena,'num')+'</td>'
      +'<td class="cena">'+uspora(p)+'</td><td>'+C('m',k,'poznamka',p.poznamka)+'</td>'+noteCell(nazev,p.komodita)+'</tr>';
  }
  return '<tr><td class="komodita">'+head+badgeHtml(p)+' '+esc(p.komodita)+'</td>'
    +'<td class="c">'+esc(p.kolo1)+'</td><td class="c">'+esc(p.kolo2)+'</td><td class="c">'+esc(p.kolo3)+'</td>'
    +'<td class="c">'+esc(p.vitez)+'</td><td class="c">'+esc(p.zasmluvneni)+'</td><td class="c">'+esc(p.objednano)+'</td>'
    +'<td class="cena">'+fmtNum(p.cenaNakladova)+'</td><td class="cena">'+fmtNum(p.cenaVysoutezena)+'</td><td class="cena">'+uspora(p)+'</td>'
    +'<td class="pozn">'+esc(p.poznamka)+'</td>'+noteCell(nazev,p.komodita)+'</tr>';
}
// ruční řádek: vždy editovatelný + smazání
function rRow(nazev,sl,id,p){var k=sl+'|'+id;
  return '<tr class="mrow"><td class="komodita"><button class="del" data-del="'+esc(k)+'" title="smazat">✕</button> '+typSel('r',k,p)+' '+C('r',k,'komodita',p.komodita,'komo')+'</td>'
    +'<td>'+C('r',k,'kolo1',p.kolo1,'ctr')+'</td><td>'+C('r',k,'kolo2',p.kolo2,'ctr')+'</td><td>'+C('r',k,'kolo3',p.kolo3,'ctr')+'</td>'
    +'<td>'+C('r',k,'vitez',p.vitez,'ctr')+'</td><td>'+C('r',k,'zasmluvneni',p.zasmluvneni,'ctr')+'</td><td>'+C('r',k,'objednano',p.objednano,'ctr')+'</td>'
    +'<td class="cena">'+C('r',k,'cenaNakladova',p.cenaNakladova,'num')+'</td><td class="cena">'+C('r',k,'cenaVysoutezena',p.cenaVysoutezena,'num')+'</td>'
    +'<td class="cena">'+uspora(p)+'</td><td>'+C('r',k,'poznamka',p.poznamka)+'</td>'+noteCell(nazev,p.komodita)+'</tr>';
}

function render(){
  var html='';
  (DATA.stavby||[]).forEach(function(s,si){
    if(FILTER.stavba!=='' && String(si)!==FILTER.stavba) return;
    var sl=slug(s.nazev), rows='', mk={};
    (s.polozky||[]).forEach(function(p0){var p=eff(s.nazev,p0);mk[(p.komodita||'').toLowerCase()]=1;if(passFilter(s.nazev,p))rows+=mRow(s.nazev,p,rowKey(s.nazev,p0.komodita));});
    var rmap=(DATA.rucni&&DATA.rucni[sl])?DATA.rucni[sl]:{};
    Object.keys(rmap).forEach(function(id){var p=rmap[id]||{};if(mk[(p.komodita||'').toLowerCase()])return;if(passFilter(s.nazev,p))rows+=rRow(s.nazev,sl,id,p);});
    var cislo=(DATA.stavby_extra&&DATA.stavby_extra[sl]&&DATA.stavby_extra[sl].cislo)?DATA.stavby_extra[sl].cislo:'';
    html+='<div class="stavba"><div class="title"><div><div class="nazev">'+esc(s.nazev)+'</div>'
      +(s.info?'<div class="info">'+esc(s.info)+'</div>':'')+'</div><div class="spc"></div>'
      +'<div class="cislo">č. stavby:<input data-cislo="'+esc(sl)+'" value="'+esc(cislo)+'" placeholder="—"></div>'
      +'<button class="btn btn-add" data-add="'+esc(sl)+'">+ řádek</button></div>'
      +'<div class="tbl-scroll"><table><thead>'
      +'<tr class="grp"><th rowspan="2">Komodita</th><th colspan="3">Výběrové řízení</th><th rowspan="2">Vítěz</th><th rowspan="2">Zasmluvnění</th><th rowspan="2">Objednáno</th><th colspan="3">Cena</th><th rowspan="2">Poznámka</th><th rowspan="2">Moje poznámka</th></tr>'
      +'<tr><th>1. kolo</th><th>2. kolo</th><th>3. kolo</th><th>Nákladová</th><th>Vysoutěžená</th><th>Úspora</th></tr>'
      +'</thead><tbody>'+(rows||'<tr><td colspan="12" class="empty">Žádné položky (filtr nebo zatím prázdné).</td></tr>')+'</tbody></table></div></div>';
  });
  $('list').innerHTML=html||'<div class="empty">Nic neodpovídá filtru.</div>';
  $('updated').textContent='M - SILNICE a.s. · OZ Jih · aktualizováno: '+(DATA.meta&&DATA.meta.updatedAt?DATA.meta.updatedAt:'—');
}

function saveField(mode,k,f,val){
  if(mode==='m'){DATA.upravy=DATA.upravy||{};DATA.upravy[k]=DATA.upravy[k]||{};DATA.upravy[k][f]=val;if(db)db.ref('/upravy/'+k+'/'+f).set(val);}
  else{var pr=k.split('|'),sl=pr[0],id=pr[1];DATA.rucni=DATA.rucni||{};DATA.rucni[sl]=DATA.rucni[sl]||{};DATA.rucni[sl][id]=DATA.rucni[sl][id]||{};DATA.rucni[sl][id][f]=val;if(db)db.ref('/rucni/'+sl+'/'+id+'/'+f).set(val);}
}
function saveNote(key,val,st){if(DATA.poznamky)DATA.poznamky[key]=val;if(db){if(st)st.textContent='ukládám…';var r=db.ref('/poznamky/'+key);(val?r.set(val):r.remove()).then(function(){if(st){st.textContent='✓ uloženo';setTimeout(function(){st.textContent='';},1500);}}).catch(function(){if(st)st.textContent='chyba';});}}
function addRow(sl){if(db){db.ref('/rucni/'+sl).push({komodita:'Nová položka',typ:'POPTÁVKA'});}else{DATA.rucni=DATA.rucni||{};DATA.rucni[sl]=DATA.rucni[sl]||{};DATA.rucni[sl]['d'+Date.now()]={komodita:'Nová položka',typ:'POPTÁVKA'};render();}}
function delRow(k){var pr=k.split('|'),sl=pr[0],id=pr[1];if(db){db.ref('/rucni/'+sl+'/'+id).remove();}else{if(DATA.rucni&&DATA.rucni[sl])delete DATA.rucni[sl][id];render();}}
function saveCislo(sl,val){DATA.stavby_extra=DATA.stavby_extra||{};DATA.stavby_extra[sl]=DATA.stavby_extra[sl]||{};DATA.stavby_extra[sl].cislo=val;if(db)db.ref('/stavby_extra/'+sl+'/cislo').set(val);}

function showApp(){$('gate').classList.add('hidden');$('topbar').classList.remove('hidden');$('app').classList.remove('hidden');buildStavbaFilter();render();}
function normalize(raw){var out={meta:(raw&&raw.meta)||{},stavby:[],poznamky:(raw&&raw.poznamky)||{},upravy:(raw&&raw.upravy)||{},rucni:(raw&&raw.rucni)||{},stavby_extra:(raw&&raw.stavby_extra)||{}};
  var sv=(raw&&raw.stavby)||{};Object.keys(sv).forEach(function(k){var s=sv[k];s._k=k;out.stavby.push(s);});
  out.stavby.sort(function(a,b){return (a.poradi||0)-(b.poradi||0);});
  out.stavby.forEach(function(s){var pl=s.polozky||[];if(!Array.isArray(pl)){var arr=[];Object.keys(pl).forEach(function(k){arr.push(pl[k]);});s.polozky=arr;}});return out;}

$('search').addEventListener('input',function(){FILTER.q=this.value;render();});
$('f-stavba').addEventListener('change',function(){FILTER.stavba=this.value;render();});
function segHandler(id,prop){$(id).addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;FILTER[prop]=b.getAttribute('data-v');[].forEach.call(this.querySelectorAll('button'),function(x){x.classList.toggle('on',x===b);});render();});}
segHandler('f-typ','typ'); segHandler('f-stav','stav');
$('list').addEventListener('click',function(e){
  var ed=e.target.closest('[data-edit]'); if(ed){var k=ed.getAttribute('data-edit');if(EDITING[k])delete EDITING[k];else EDITING[k]=1;render();return;}
  var add=e.target.closest('[data-add]'); if(add){addRow(add.getAttribute('data-add'));return;}
  var del=e.target.closest('[data-del]'); if(del){if(confirm('Smazat tento řádek?'))delRow(del.getAttribute('data-del'));return;}
});
$('list').addEventListener('change',function(e){var t=e.target;
  if(t.hasAttribute('data-cislo')){saveCislo(t.getAttribute('data-cislo'),t.value.trim());return;}
  if(t.classList.contains('note')){saveNote(t.getAttribute('data-notekey'),t.value.trim(),document.querySelector('[data-st="'+t.getAttribute('data-notekey')+'"]'));return;}
  if(t.classList.contains('cell')){saveField(t.getAttribute('data-mode'),t.getAttribute('data-k'),t.getAttribute('data-f'),t.value);}
});

function startApp(){if(started)return;started=true;showApp();try{db.ref('/').on('value',function(snap){DATA=normalize(snap.val()||{});render();},function(){});}catch(e){}}
if(DEMO_MODE){$('demo').classList.remove('hidden');DATA=DEMO;DATA.poznamky={};DATA.upravy={};DATA.rucni={};DATA.stavby_extra={};showApp();$('logout').classList.add('hidden');}
else{
  firebase.initializeApp(FIREBASE_CONFIG); auth=firebase.auth(); db=firebase.database();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function(){});
  $('g-login').addEventListener('click',function(){$('g-err').textContent='';var e=$('g-email').value.trim(),p=$('g-pass').value;
    if(!e||!p){$('g-err').textContent='Vyplň e-mail i heslo.';return;}$('g-login').textContent='Přihlašuji…';
    auth.signInWithEmailAndPassword(e,p).then(function(){startApp();}).catch(function(err){$('g-login').textContent='Přihlásit';$('g-err').textContent='Chyba: '+(err&&err.code?err.code:'')+' '+(err&&err.message?err.message:'');});});
  $('g-pass').addEventListener('keydown',function(ev){if(ev.key==='Enter')$('g-login').click();});
  $('logout').addEventListener('click',function(){started=false;auth.signOut();});
  auth.onAuthStateChanged(function(user){if(user){startApp();}else{started=false;$('gate').classList.remove('hidden');$('topbar').classList.add('hidden');$('app').classList.add('hidden');$('g-login').textContent='Přihlásit';}});
}
</script>
</body>
</html>
