<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoptГЎvky a objednГЎvky вҖ” M - SILNICE a.s.</title>
<style>
  :root{
    --bg:#0f1720; --card:#16212e; --line:#26384a; --txt:#e7eef6; --muted:#9fb2c6;
    --poptavka:#2563eb; --objednavka:#16a34a; --accent:#3b82f6; --head:#111c28; --title:#142433;
    --pos:#16a34a; --neg:#ef4444; --edit:#0c131b; --rucni:#1a2740;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
       background:var(--bg);color:var(--txt);-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:5;background:#0c131b;border-bottom:1px solid var(--line);
         padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700;line-height:1.2}
  header .sub{font-size:11px;color:var(--muted)}
  header .spacer{flex:1}
  .btn{background:#1f2d3d;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn-add{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .ctrl{background:var(--edit);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;font-size:14px}
  #search{flex:1;min-width:160px;max-width:320px}
  .wrap{padding:12px 14px 60px;max-width:1320px;margin:0 auto}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0 14px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--edit);color:var(--muted);border:0;padding:8px 12px;font-size:13px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;font-weight:700}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;vertical-align:middle}
  .b-pop{background:var(--poptavka)} .b-obj{background:var(--objednavka)}
  .stavba{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .stavba .title{padding:12px 14px;border-bottom:1px solid var(--line);background:var(--title);display:flex;align-items:flex-start;gap:10px}
  .stavba .title .nazev{font-size:18px;font-weight:800;letter-spacing:.4px}
  .stavba .title .info{font-size:12px;color:var(--muted);margin-top:3px}
  .stavba .title .spc{flex:1}
  .tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:1100px}
  th,td{padding:6px 8px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:top;text-align:left}
  th:last-child,td:last-child{border-right:none}
  thead th{font-size:11px;color:var(--muted);background:var(--head);text-align:center;font-weight:700}
  thead tr.grp th{text-transform:uppercase;letter-spacing:.5px}
  td.komodita{font-weight:700;white-space:nowrap}
  td.c{text-align:center;white-space:nowrap}
  td.cena{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.pozn{color:var(--muted);font-size:12px;min-width:180px}
  .uspora-pos{color:var(--pos)} .uspora-neg{color:var(--neg)}
  tr:last-child td{border-bottom:none}
  tr.mrow td{background:var(--rucni)}
  textarea.note{width:100%;min-width:160px;min-height:32px;background:var(--edit);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:5px 7px;font:inherit;font-size:12px;resize:vertical}
  textarea.note:focus,.cell:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .note-status{font-size:10px;color:var(--muted);height:12px}
  .cell{width:100%;min-width:70px;background:var(--edit);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:5px 6px;font:inherit;font-size:12px}
  .cell.komo{min-width:130px;font-weight:700}
  .del{background:transparent;border:0;color:var(--neg);cursor:pointer;font-size:15px;padding:0 4px}
  .empty{color:var(--muted);font-size:13px;padding:14px}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20}
  #gate .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;width:100%;max-width:340px}
  #gate h2{margin:0 0 4px;font-size:18px}
  #gate p{margin:0 0 16px;color:var(--muted);font-size:13px}
  #gate input{width:100%;padding:11px 12px;margin-bottom:10px;border-radius:9px;border:1px solid var(--line);background:#0c131b;color:var(--txt);font-size:15px}
  #gate .btn{width:100%;background:var(--accent);border-color:var(--accent);font-weight:700;padding:11px}
  #gate .err{color:#f87171;font-size:13px;min-height:18px;margin-top:6px}
  .hidden{display:none!important}
  .demo-bar{background:#7c3a02;color:#ffd9a8;font-size:12px;text-align:center;padding:6px}
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <h2>PoptГЎvky a objednГЎvky</h2>
    <p>M - SILNICE a.s. В· OZ Jih вҖ” pЕҷihlГЎЕЎenГӯ</p>
    <input id="g-email" type="email" placeholder="e-mail" autocomplete="username">
    <input id="g-pass" type="password" placeholder="heslo" autocomplete="current-password">
    <button class="btn" id="g-login">PЕҷihlГЎsit</button>
    <div class="err" id="g-err"></div>
  </div>
</div>

<div id="demo" class="demo-bar hidden">UKГҒZKOVГқ REЕҪIM вҖ” data jsou demo, zmДӣny se neuklГЎdajГӯ.</div>

<header class="hidden" id="topbar">
  <div><h1>PoptГЎvky a objednГЎvky</h1><div class="sub" id="updated">M - SILNICE a.s. В· OZ Jih</div></div>
  <div class="spacer"></div>
  <button class="btn" id="logout">OdhlГЎsit</button>
</header>

<div class="wrap hidden" id="app">
  <div class="toolbar">
    <input id="search" class="ctrl" placeholder="рҹ”Һ hledatвҖҰ">
    <select id="f-stavba" class="ctrl"><option value="">VЕЎechny stavby</option></select>
    <div class="seg" id="f-typ"><button data-v="all" class="on">VЕЎe</button><button data-v="pop">PoptГЎvky</button><button data-v="obj">ObjednГЎvky</button></div>
    <div class="seg" id="f-stav"><button data-v="all" class="on">VЕЎe</button><button data-v="obj">ObjednГЎno</button><button data-v="ceka">ДҢekГЎ</button></div>
  </div>
  <div id="list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyA_9Zm7J_iDVkcfF3MAWoSMEtJipBkIAo0",
  authDomain: "poptavky-objednavky.firebaseapp.com",
  databaseURL: "https://poptavky-objednavky-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "poptavky-objednavky",
  storageBucket: "poptavky-objednavky.firebasestorage.app",
  messagingSenderId: "418167107219",
  appId: "1:418167107219:web:225bafe8e9b79636cca766"
};

var DEMO = {meta:{updatedAt:"16.6.2026 (demo)"},stavby:[
  {nazev:"вҖһII/603 SULICE вҖ“ ЕҪELIVEC, REKONSTRUKCE SILNICE A MOSTЕ®\"",info:"ZaДҚГЎtek 11.5.2026 В· 15 mДӣsГӯcЕҜ В· 2 sezony",
   polozky:[{komodita:"DopravnГӯ znaДҚenГӯ",typ:"POPTГҒVKA",kolo1:"4.6.",poznamka:"Aktualizace CN. TermГӯn do 8.6.2026."},
            {komodita:"Krajnice",typ:"OBJEDNГҒVKA",kolo1:"16.6.",vitez:"DOKR NB",zasmluvneni:"ObjednГЎvka",objednano:"ANO",poznamka:"ДҢekГЎ se na podpis."}]},
  {nazev:"вҖһD4 PHS MNГҚЕ EK POD BRDY\"",info:"ProtihlukovГЎ stДӣna",
   polozky:[{komodita:"Beton",typ:"OBJEDNГҒVKA",kolo1:"26.5.",vitez:"PROTEKO",zasmluvneni:"ObjednГЎvka",objednano:"ANO",poznamka:""}]}
]};

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function isPlaceholder(){return !FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.indexOf('PLACEHOLDER')!==-1;}
var DEMO_MODE = isPlaceholder() || /[?&]demo/.test(location.search) || location.hostname==='localhost' || location.hostname==='127.0.0.1';

var DATA={meta:{},stavby:[],poznamky:{},rucni:{}};
var FILTER={q:'',stavba:'',typ:'all',stav:'all'};
var db=null, auth=null;

function fmtNum(v){if(v===''||v==null)return '';var n=(typeof v==='number')?v:parseFloat(String(v).replace(/\s/g,'').replace(',','.'));if(isNaN(n))return esc(v);return n.toLocaleString('cs-CZ',{minimumFractionDigits:0,maximumFractionDigits:2});}
function toNum(v){var n=(typeof v==='number')?v:parseFloat(String(v).replace(/\s/g,'').replace(',','.'));return isNaN(n)?null:n;}
function isObj(p){return (p.typ||'').toUpperCase().indexOf('OBJ')===0;}
function slug(s){return String(s).replace(/[вҖһ""]/g,'').replace(/[.$#\[\]\/\x00-\x1f]+/g,'_').replace(/\s+/g,'_').slice(0,180);}
function noteKey(nazev,komodita){return (slug(nazev)+'__'+slug(komodita)).slice(0,200);}

function buildStavbaFilter(){
  var sel=$('f-stavba'),cur=sel.value,opts='<option value="">VЕЎechny stavby</option>';
  (DATA.stavby||[]).forEach(function(s,i){opts+='<option value="'+i+'">'+esc((s.nazev||'').replace(/[вҖһ""]/g,'').trim())+'</option>';});
  sel.innerHTML=opts; sel.value=cur;
}
function passFilter(s,p){
  var objedn=isObj(p);
  if(FILTER.typ==='pop'&&objedn)return false;
  if(FILTER.typ==='obj'&&!objedn)return false;
  var jeObj=(String(p.objednano||'').toUpperCase().indexOf('ANO')===0);
  if(FILTER.stav==='obj'&&!jeObj)return false;
  if(FILTER.stav==='ceka'&&jeObj)return false;
  var q=FILTER.q.trim().toLowerCase();
  if(q && (s.nazev+' '+(p.komodita||'')+' '+(p.vitez||'')+' '+(p.poznamka||'')).toLowerCase().indexOf(q)===-1)return false;
  return true;
}
function usporaCell(p){var nN=toNum(p.cenaNakladova),nV=toNum(p.cenaVysoutezena);if(nN!=null&&nV!=null){var d=nN-nV;return '<span class="'+(d>=0?'uspora-pos':'uspora-neg')+'">'+fmtNum(d)+'</span>';}return '';}

function mirroredRow(s,p){
  var bcls=isObj(p)?'b-obj':'b-pop',btxt=isObj(p)?'OBJ':'POP';
  var key=noteKey(s.nazev,p.komodita), mp=(DATA.poznamky&&DATA.poznamky[key])?DATA.poznamky[key]:'';
  return '<tr><td class="komodita"><span class="badge '+bcls+'">'+btxt+'</span> '+esc(p.komodita)+'</td>'
    +'<td class="c">'+esc(p.kolo1)+'</td><td class="c">'+esc(p.kolo2)+'</td><td class="c">'+esc(p.kolo3)+'</td>'
    +'<td class="c">'+esc(p.vitez)+'</td><td class="c">'+esc(p.zasmluvneni)+'</td><td class="c">'+esc(p.objednano)+'</td>'
    +'<td class="cena">'+fmtNum(p.cenaNakladova)+'</td><td class="cena">'+fmtNum(p.cenaVysoutezena)+'</td><td class="cena">'+usporaCell(p)+'</td>'
    +'<td class="pozn">'+esc(p.poznamka)+'</td>'
    +'<td><textarea class="note" data-key="'+esc(key)+'" placeholder="moje poznГЎmkaвҖҰ">'+esc(mp)+'</textarea><div class="note-status" data-st="'+esc(key)+'"></div></td></tr>';
}
function inp(sl,id,f,val,cls){return '<input class="cell '+(cls||'')+'" data-sl="'+esc(sl)+'" data-id="'+esc(id)+'" data-f="'+f+'" value="'+esc(val||'')+'">';}
function manualRow(sl,id,p){
  var typSel='<select class="cell" data-sl="'+esc(sl)+'" data-id="'+esc(id)+'" data-f="typ" style="min-width:70px">'
    +'<option value="POPTГҒVKA"'+(!isObj(p)?' selected':'')+'>POP</option><option value="OBJEDNГҒVKA"'+(isObj(p)?' selected':'')+'>OBJ</option></select>';
  return '<tr class="mrow">'
    +'<td><button class="del" data-del="'+esc(sl)+'|'+esc(id)+'" title="smazat ЕҷГЎdek">вң•</button> '+typSel+' '+inp(sl,id,'komodita',p.komodita,'komo')+'</td>'
    +'<td class="c">'+inp(sl,id,'kolo1',p.kolo1)+'</td><td class="c">'+inp(sl,id,'kolo2',p.kolo2)+'</td><td class="c">'+inp(sl,id,'kolo3',p.kolo3)+'</td>'
    +'<td class="c">'+inp(sl,id,'vitez',p.vitez)+'</td><td class="c">'+inp(sl,id,'zasmluvneni',p.zasmluvneni)+'</td><td class="c">'+inp(sl,id,'objednano',p.objednano)+'</td>'
    +'<td class="cena">'+inp(sl,id,'cenaNakladova',p.cenaNakladova)+'</td><td class="cena">'+inp(sl,id,'cenaVysoutezena',p.cenaVysoutezena)+'</td><td class="cena">'+usporaCell(p)+'</td>'
    +'<td>'+inp(sl,id,'poznamka',p.poznamka)+'</td><td></td></tr>';
}

function render(){
  var html='';
  (DATA.stavby||[]).forEach(function(s,si){
    if(FILTER.stavba!=='' && String(si)!==FILTER.stavba) return;
    var sl=slug(s.nazev), rows='';
    (s.polozky||[]).forEach(function(p){ if(passFilter(s,p)) rows+=mirroredRow(s,p); });
    var rmap=(DATA.rucni&&DATA.rucni[sl])?DATA.rucni[sl]:{};
    var mirroredKomod={}; (s.polozky||[]).forEach(function(p){mirroredKomod[(p.komodita||'').toLowerCase()]=1;});
    Object.keys(rmap).forEach(function(id){
      var p=rmap[id]||{};
      if(mirroredKomod[(p.komodita||'').toLowerCase()]) return; // dedup: stejnГЎ komodita uЕҫ pЕҷiЕЎla mailem
      if(passFilter(s,p)) rows+=manualRow(sl,id,p);
    });
    html+='<div class="stavba"><div class="title"><div><div class="nazev">'+esc(s.nazev)+'</div>'
      +(s.info?'<div class="info">'+esc(s.info)+'</div>':'')+'</div><div class="spc"></div>'
      +'<button class="btn btn-add" data-add="'+esc(sl)+'">+ ЕҷГЎdek</button></div>'
      +'<div class="tbl-scroll"><table><thead>'
      +'<tr class="grp"><th rowspan="2">Komodita</th><th colspan="3">VГҪbДӣrovГ© ЕҷГӯzenГӯ</th><th rowspan="2">VГӯtДӣz</th><th rowspan="2">ZasmluvnДӣnГӯ</th><th rowspan="2">ObjednГЎno</th><th colspan="3">Cena</th><th rowspan="2">PoznГЎmka</th><th rowspan="2">Moje poznГЎmka</th></tr>'
      +'<tr><th>1. kolo</th><th>2. kolo</th><th>3. kolo</th><th>NГЎkladovГЎ</th><th>VysoutДӣЕҫenГЎ</th><th>Гҡspora</th></tr>'
      +'</thead><tbody>'+(rows||'<tr><td colspan="12" class="empty">ЕҪГЎdnГ© poloЕҫky (filtr nebo zatГӯm prГЎzdnГ©).</td></tr>')+'</tbody></table></div></div>';
  });
  $('list').innerHTML=html||'<div class="empty">Nic neodpovГӯdГЎ filtru.</div>';
  $('updated').textContent='M - SILNICE a.s. В· OZ Jih В· aktualizovГЎno: '+(DATA.meta&&DATA.meta.updatedAt?DATA.meta.updatedAt:'вҖ”');
}

function saveNote(key,val,st){
  if(DATA.poznamky)DATA.poznamky[key]=val;
  if(db){if(st)st.textContent='uklГЎdГЎmвҖҰ';var r=db.ref('/poznamky/'+key);(val?r.set(val):r.remove()).then(function(){if(st){st.textContent='вң“ uloЕҫeno';setTimeout(function(){st.textContent='';},1500);}}).catch(function(){if(st)st.textContent='chyba';});}
}
function saveCell(sl,id,f,val){
  DATA.rucni=DATA.rucni||{}; DATA.rucni[sl]=DATA.rucni[sl]||{}; DATA.rucni[sl][id]=DATA.rucni[sl][id]||{}; DATA.rucni[sl][id][f]=val;
  if(db) db.ref('/rucni/'+sl+'/'+id+'/'+f).set(val);
}
function addRow(sl){
  if(db){ db.ref('/rucni/'+sl).push({komodita:'NovГЎ poloЕҫka',typ:'POPTГҒVKA'}); }
  else { DATA.rucni=DATA.rucni||{};DATA.rucni[sl]=DATA.rucni[sl]||{};DATA.rucni[sl]['demo'+Date.now()]={komodita:'NovГЎ poloЕҫka',typ:'POPTГҒVKA'};render(); }
}
function delRow(sl,id){
  if(db){ db.ref('/rucni/'+sl+'/'+id).remove(); }
  else { if(DATA.rucni&&DATA.rucni[sl])delete DATA.rucni[sl][id]; render(); }
}

function showApp(){$('gate').classList.add('hidden');$('topbar').classList.remove('hidden');$('app').classList.remove('hidden');buildStavbaFilter();render();}

function normalize(raw){
  var out={meta:(raw&&raw.meta)||{},stavby:[],poznamky:(raw&&raw.poznamky)||{},rucni:(raw&&raw.rucni)||{}};
  var sv=(raw&&raw.stavby)||{};
  Object.keys(sv).forEach(function(k){var s=sv[k];s._k=k;out.stavby.push(s);});
  out.stavby.sort(function(a,b){return (a.poradi||0)-(b.poradi||0);});
  out.stavby.forEach(function(s){var pl=s.polozky||[];if(!Array.isArray(pl)){var arr=[];Object.keys(pl).forEach(function(k){arr.push(pl[k]);});s.polozky=arr;}});
  return out;
}

$('search').addEventListener('input',function(){FILTER.q=this.value;render();});
$('f-stavba').addEventListener('change',function(){FILTER.stavba=this.value;render();});
function segHandler(id,prop){$(id).addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;FILTER[prop]=b.getAttribute('data-v');[].forEach.call(this.querySelectorAll('button'),function(x){x.classList.toggle('on',x===b);});render();});}
segHandler('f-typ','typ'); segHandler('f-stav','stav');

// klik: pЕҷidat / smazat ЕҷГЎdek
$('list').addEventListener('click',function(e){
  var add=e.target.closest('[data-add]'); if(add){addRow(add.getAttribute('data-add'));return;}
  var del=e.target.closest('[data-del]'); if(del){var pr=del.getAttribute('data-del').split('|');if(confirm('Smazat tento ЕҷГЎdek?'))delRow(pr[0],pr[1]);return;}
});
// zmДӣna: poznГЎmka i buЕҲky ruДҚnГӯch ЕҷГЎdkЕҜ
$('list').addEventListener('change',function(e){
  var t=e.target;
  if(t.classList.contains('note')){saveNote(t.getAttribute('data-key'),t.value.trim(),document.querySelector('[data-st="'+t.getAttribute('data-key')+'"]'));return;}
  if(t.classList.contains('cell')){saveCell(t.getAttribute('data-sl'),t.getAttribute('data-id'),t.getAttribute('data-f'),t.value);}
});

if(DEMO_MODE){
  $('demo').classList.remove('hidden');
  DATA=DEMO; DATA.poznamky={}; DATA.rucni={}; showApp(); $('logout').classList.add('hidden');
} else {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth=firebase.auth(); db=firebase.database();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  $('g-login').addEventListener('click',function(){
    $('g-err').textContent='';var e=$('g-email').value.trim(),p=$('g-pass').value;
    if(!e||!p){$('g-err').textContent='VyplЕҲ e-mail i heslo.';return;}
    $('g-login').textContent='PЕҷihlaЕЎujiвҖҰ';
    auth.signInWithEmailAndPassword(e,p).catch(function(){$('g-login').textContent='PЕҷihlГЎsit';$('g-err').textContent='PЕҷihlГЎЕЎenГӯ selhalo.';});
  });
  $('g-pass').addEventListener('keydown',function(ev){if(ev.key==='Enter')$('g-login').click();});
  $('logout').addEventListener('click',function(){auth.signOut();});
  auth.onAuthStateChanged(function(user){
    if(user){ db.ref('/').on('value',function(snap){DATA=normalize(snap.val()||{});showApp();}); }
    else { $('gate').classList.remove('hidden');$('topbar').classList.add('hidden');$('app').classList.add('hidden');$('g-login').textContent='PЕҷihlГЎsit'; }
  });
}
</script>
</body>
</html>
